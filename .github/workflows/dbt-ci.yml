name: dbt CI

# Run on every PR (catch issues before review) and every push to main
# (catch issues that snuck in via direct commit).
on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-and-compile:
    name: Lint + dbt parse
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # `dbt parse` needs a profile file to know how to quote identifiers,
      # but it does NOT actually connect to BigQuery. Placeholder values
      # are fine.
      - name: Write placeholder dbt profile
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << 'EOF'
          lessons:
            target: ci
            outputs:
              ci:
                type: bigquery
                method: oauth
                project: dbt-ci-placeholder
                dataset: dbt_ci
                location: US
                threads: 1
                priority: interactive
          EOF

      - name: Install dbt packages
        working-directory: lessons
        run: dbt deps

      # `dbt parse` expands all Jinja and validates every ref() points to
      # an existing model. Catches the #1 PR-breaker (renaming a model
      # without updating callers) without needing warehouse access.
      - name: dbt parse
        working-directory: lessons
        run: dbt parse

      # Locally we use templater=dbt for maximum accuracy, but that loads
      # dbt-core which tries to authenticate to BigQuery at adapter init
      # (fails on a credential-less CI runner). The jinja templater with
      # `apply_dbt_builtins = True` (set in .sqlfluff) stubs ref/source/
      # config/var/this so sqlfluff can compile templates without dbt.
      # Loses some accuracy (refs become literal model names instead of
      # fully-qualified paths) but catches all style + most layout issues.
      - name: sqlfluff lint (CI uses jinja templater, no BQ creds needed)
        run: sqlfluff lint lessons/models --templater jinja
