name: dbt CI

# Run on every PR (catch issues before review) and every push to main
# (catch issues that snuck in via direct commit).
on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-and-compile:
    name: Lint + dbt parse
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # CI needs to satisfy dbt-bigquery's credential-loading code path
      # without an actual GCP service account. We generate a throwaway RSA
      # key, wrap it in a structurally-valid service-account JSON, and
      # point dbt at it. dbt loads it at adapter init (succeeds), but no
      # query is ever issued so the fake credentials are never tested.
      # `dbt parse` worked without this, but sqlfluff's dbt templater
      # goes deeper and triggers the credential lookup.
      - name: Generate throwaway service-account credentials for CI
        run: |
          openssl genrsa 2048 > /tmp/ci-private-key.pem
          python - << 'PY'
          import json
          with open('/tmp/ci-private-key.pem') as f:
              private_key = f.read()
          sa = {
              "type": "service_account",
              "project_id": "dbt-ci-placeholder",
              "private_key_id": "ci-placeholder",
              "private_key": private_key,
              "client_email": "ci@dbt-ci-placeholder.iam.gserviceaccount.com",
              "client_id": "0",
              "auth_uri": "https://accounts.google.com/o/oauth2/auth",
              "token_uri": "https://oauth2.googleapis.com/token",
              "auth_provider_x509_cert_url": "https://www.googleapis.com/oauth2/v1/certs",
              "client_x509_cert_url": "https://www.googleapis.com/robot/v1/metadata/x509/ci"
          }
          with open('/tmp/sa-key.json', 'w') as f:
              json.dump(sa, f)
          PY

      - name: Write CI dbt profile
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << 'EOF'
          lessons:
            target: ci
            outputs:
              ci:
                type: bigquery
                method: service-account
                keyfile: /tmp/sa-key.json
                project: dbt-ci-placeholder
                dataset: dbt_ci
                location: US
                threads: 1
                priority: interactive
                job_execution_timeout_seconds: 300
                job_retries: 1
          EOF

      - name: Install dbt packages
        working-directory: lessons
        run: dbt deps

      # `dbt parse` expands all Jinja and validates every ref() points to
      # an existing model. Catches the #1 PR-breaker (renaming a model
      # without updating callers) without needing warehouse access.
      - name: dbt parse
        working-directory: lessons
        run: dbt parse

      # sqlfluff with templater=dbt uses dbt internally to compile each
      # model's Jinja, then lints the resulting SQL. Same check that
      # runs locally via the pre-commit hook — ensures CI agrees.
      - name: sqlfluff lint
        run: sqlfluff lint lessons/models
